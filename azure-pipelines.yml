trigger:
  branches:
    include: [ "main", "develop" ]

pool:
  name: 'Default' # Ton agent local (qui doit avoir Docker lancé)

stages:
- stage: CI_Docker_Web
  displayName: 'Build Image Docker'
  jobs:
  - job: Push_to_Registry
    steps:
    # 1. Analyse statique SonarCloud du code React
    - task: SonarCloudPrepare@3
      inputs:
        SonarCloud: 'SonarCloud-CYNA'
        organization: '2028di1p5g3'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: '2028DI1P5G3_Cyna-Web'
        cliProjectName: 'CYNA - Frontend Web'
        cliSources: '.'
        extraProperties: |
          sonar.tests=.
          sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.ts
          sonar.javascript.lcov.reportPaths=coverage/lcov.info

    # Installation locale pour générer le rapport de couverture requis par Sonar
    - script: npm ci && npm run test -- --coverage --watchAll=false
      displayName: 'Tests Unitaires pour SonarCloud'
      continueOnError: true # Évite de bloquer la suite si tes tests ne sont pas encore parfaits

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud Analysis'
      
    - task: SonarCloudPublish@3
      displayName: 'Publish Quality Gate'
      inputs:
        pollingTimeoutSec: '300' # <-- AJOUTE CETTE LIGNE (Donne jusqu'à 5 min d'attente max à Azure)

    # 2. La partie Docker en ligne de commande directe (Plus besoin de Service Connection !)
    - script: |
        docker build -t cyna-frontend:latest .
      displayName: 'Docker Build Image'