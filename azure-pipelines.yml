trigger:
  branches:
    include: [ "main", "dev" ]

pool:
  name: 'CyanPool'

variables:
  - group: 'GHCR'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
      - name: envName
        value: 'production'
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/dev') }}:
      - name: envName
        value: 'staging'
  - name: GHCR_REGISTRY
    value: 'ghcr.io'
  - name: GHCR_NAMESPACE
    value: 'nizardv'
  - name: IMAGE_NAME
    value: 'cyna-frontend'
  - name: FULL_IMAGE
    value: '$(GHCR_REGISTRY)/$(GHCR_NAMESPACE)/$(IMAGE_NAME)'

stages:
- stage: CI_CD_MultiEnv
  displayName: 'CI/CD Multi-Environnements'
  jobs:
  - job: Build_And_Deploy
    steps:

    # 1. Analyse statique SonarCloud
    - task: SonarCloudPrepare@3
      inputs:
        SonarCloud: 'SonarCloud-CYNA'
        organization: '2028di1p5g3'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: '2028DI1P5G3_Cyna-Web'
        cliProjectName: 'CYNA - Frontend Web'
        cliSources: '.'
        extraProperties: |
          sonar.tests=.
          sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.ts
          sonar.javascript.lcov.reportPaths=coverage/lcov.info

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud Analysis'

    - task: SonarCloudPublish@3
      displayName: 'Publish Quality Gate'
      inputs:
        pollingTimeoutSec: '300'
      continueOnError: true

    # 2. Login to GitHub Container Registry
    - task: Docker@2
      displayName: 'Login to GHCR'
      inputs:
        command: login
        containerRegistry: 'GHCR-Cyna-Connection'   # Nom de ta service connection

    # 3. Build de l'image (une seule fois, tous les tags)
    - script: |
        docker build \
          -t $(FULL_IMAGE):$(envName) \
          -t $(FULL_IMAGE):latest \
          -t $(FULL_IMAGE):sha-$(Build.SourceVersion) \
          -t $(FULL_IMAGE):build-$(Build.BuildId) \
          -t $(FULL_IMAGE):$(Build.SourceBranchName) \
          .
      displayName: 'Docker Build [ $(envName) ]'

    # 4. Run local sur l'agent
    - script: |
        docker stop cyna-web-$(envName) 2>/dev/null || true
        docker rm   cyna-web-$(envName) 2>/dev/null || true

        if [ "$(envName)" = "production" ]; then
          echo "Démarrage de la PRODUCTION sur le port 8080..."
          docker run -d --name cyna-web-production -p 8080:80 \
            $(FULL_IMAGE):production
        else
          echo "Démarrage du STAGING sur le port 8081..."
          docker run -d --name cyna-web-staging -p 8081:80 \
            $(FULL_IMAGE):staging
        fi
      displayName: 'CD : Run Conteneur [ $(envName) ]'

    # 5. Push vers GHCR
    - script: |
        docker push $(FULL_IMAGE):$(envName)
        docker push $(FULL_IMAGE):latest
        docker push $(FULL_IMAGE):sha-$(Build.SourceVersion)
        docker push $(FULL_IMAGE):build-$(Build.BuildId)
        docker push $(FULL_IMAGE):$(Build.SourceBranchName)
      displayName: 'Push Docker Image → GHCR [ $(envName) ]'

    - task: SSH@0
      displayName: 'Deploy sur OVH'
      inputs:
        sshEndpoint: 'OVH-SSH-Connection'
        runOptions: 'inline'
        inline: |
          echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin
          docker pull ghcr.io/nizardv/cyna-frontend:$(envName)
          docker stop cyna-web-$(envName) 2>/dev/null || true
          docker rm   cyna-web-$(envName) 2>/dev/null || true

          if [ "$(envName)" = "production" ]; then
            PORT=3000
          else
            PORT=3001
          fi

          docker run -d \
            --name cyna-web-$(envName) \
            --restart unless-stopped \
            -p 127.0.0.1:$PORT:80 \
            ghcr.io/nizardv/cyna-frontend:$(envName)