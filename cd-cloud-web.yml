trigger: none

resources:
  pipelines:
  - pipeline: 'ci-web'
    source: 'Cyna-Web CI'
    trigger:
      branches:
        include: [ "main", "dev" ]

pool:
  name: 'CyanPool'

variables:
  - group: 'GHCR'
  - name: FULL_IMAGE
    value: 'ghcr.io/nizardv/cyna-frontend'
  - name: RAW_BRANCH
    value: $(resources.pipeline['ci-web'].sourceBranch)

stages:
- stage: CD_Cloud
  displayName: 'CD Cloud — Deploy OVH'
  jobs:
  - deployment: Deploy
    environment: 'OVH-Cloud'
    strategy:
      runOnce:
        deploy:
          steps:
          # ── STEP 1 : Calcul des variables en Bash ──
          - bash: |
              BRANCH_NAME=$(echo "$(RAW_BRANCH)" | sed 's|refs/heads/||')
              echo "Pipeline déclenché par la branche : $BRANCH_NAME"
              
              if [ "$BRANCH_NAME" = "main" ]; then
                echo "##vso[task.setvariable variable=envName]prod"
                echo "##vso[task.setvariable variable=WEB_PORT]3000"
                echo "##vso[task.setvariable variable=VITE_API_URL]https://api.projet-cyna.fr"
              else
                echo "##vso[task.setvariable variable=envName]staging"
                echo "##vso[task.setvariable variable=WEB_PORT]3001"
                echo "##vso[task.setvariable variable=VITE_API_URL]https://api.staging.projet-cyna.fr"
              fi
            displayName: 'Calcul dynamique de l’environnement cible'

          # ── STEP 2 : Déploiement SSH ──
          - task: SSH@0
            displayName: 'Deploy Frontend sur OVH'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              inline: |
                echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin

                echo "─── Pull & Recréation du conteneur Web ($(envName)) sur le port $(WEB_PORT) ───"
                docker pull $(FULL_IMAGE):$(envName)
                docker stop cyna-web-$(envName) 2>/dev/null || true
                docker rm   cyna-web-$(envName) 2>/dev/null || true

                docker run -d \
                  --name cyna-web-$(envName) \
                  --restart unless-stopped \
                  -p 127.0.0.1:$(WEB_PORT):80 \
                  $(FULL_IMAGE):$(envName)