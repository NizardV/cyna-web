trigger: none
resources:
  pipelines:
  - pipeline: 'ci-web'
    source: 'Cyna-Web CI'
    trigger:
      branches:
        include: [ "main", "dev" ]
pool:
  name: 'CyanPool'
variables:
  - group: 'GHCR'
  - name: FULL_IMAGE
    value: 'ghcr.io/nizardv/cyna-frontend'

stages:
- stage: CD_Cloud
  displayName: 'CD Cloud — Deploy OVH'
  jobs:
  # ══════════════════════════════════════════
  # JOB STAGING — déclenché sur dev
  # ══════════════════════════════════════════
  - deployment: DeployStaging
    displayName: 'Deploy Staging'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')
    environment: 'OVH-Cloud'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: 'Deploy Frontend staging'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                echo "$GHCR_PAT_ENV" | docker login ghcr.io -u NizardV --password-stdin
                cd ~/cyna-infra && git pull origin main
                cd docker-compose/
                echo "─── Pull & Relance Frontend staging sur le port 3001 ───"
                docker compose -p cyna-staging -f docker-compose.staging.yml pull web
                docker compose -p cyna-staging -f docker-compose.staging.yml up -d --no-build --force-recreate --no-deps web
            env:
              GHCR_PAT_ENV: $(GHCR_PAT)

          - task: SSH@0
            displayName: 'Health check staging'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                sleep 5
                curl -f http://localhost:3001 || exit 1

  # ══════════════════════════════════════════
  # JOB PROD — déclenché sur main
  # ══════════════════════════════════════════
  - deployment: DeployProd
    displayName: 'Deploy Production'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    environment: 'OVH-Cloud'
    strategy:
      runOnce:
        deploy:
          steps:
          # ── Versioning ──
          - bash: |
              git fetch --tags
              LAST_TAG=$(git tag --sort=-v:refname | grep -E '^web/v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)

              if [ -z "$LAST_TAG" ]; then
                LAST_TAG="web/v0.0.0"
              fi

              VERSION=${LAST_TAG#web/v}
              MAJOR=$(echo $VERSION | cut -d. -f1)
              MINOR=$(echo $VERSION | cut -d. -f2)
              PATCH=$(echo $VERSION | cut -d. -f3)

              COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
              BUMP="patch"
              if echo "$COMMITS" | grep -qE '^feat!:|^fix!:|^refactor!:'; then
                BUMP="major"
              elif echo "$COMMITS" | grep -qE '^feat:'; then
                BUMP="minor"
              fi

              case $BUMP in
                major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR+1)); PATCH=0 ;;
                patch) PATCH=$((PATCH+1)) ;;
              esac

              NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
              NEW_TAG="web/${NEW_VERSION}"
              echo "##vso[task.setvariable variable=NEW_VERSION]$NEW_VERSION"
              echo "##vso[task.setvariable variable=NEW_TAG]$NEW_TAG"

              curl -s -X POST \
                "https://dev.azure.com/2028DI1P5G3/DIIAGE%202028%20DI1%20P5%20G3/_apis/git/repositories/Cyna-Web/refs?api-version=7.1" \
                -H "Content-Type: application/json" \
                -H "Authorization: Basic $(echo -n ":$(ADO_PAT)" | base64)" \
                -d "[{
                  \"name\": \"refs/tags/${NEW_TAG}\",
                  \"newObjectId\": \"$(Build.SourceVersion)\",
                  \"oldObjectId\": \"0000000000000000000000000000000000000000\"
                }]"

              echo "Tag $NEW_TAG créé ✅"
            displayName: 'Versioning — Calcul et tag Git'

          # ── Tag image Docker ──
          - bash: |
              echo "$(GHCR_PAT)" | docker login ghcr.io -u NizardV --password-stdin
              docker pull $(FULL_IMAGE):prod
              docker tag $(FULL_IMAGE):prod $(FULL_IMAGE):$(NEW_VERSION)
              docker push $(FULL_IMAGE):$(NEW_VERSION)
              echo "Image taguée $(NEW_VERSION) ✅"
            displayName: 'Tag image Docker avec version'

          # ── Déploiement ──
          - task: SSH@0
            displayName: 'Deploy Frontend prod'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                echo "$GHCR_PAT_ENV" | docker login ghcr.io -u NizardV --password-stdin
                cd ~/cyna-infra && git pull origin main
                cd docker-compose/
                echo "─── Pull & Relance Frontend prod sur le port 3000 ───"
                docker compose -p cyna-prod -f docker-compose.prod.yml pull web
                docker compose -p cyna-prod -f docker-compose.prod.yml up -d --no-build --force-recreate --no-deps web
            env:
              GHCR_PAT_ENV: $(GHCR_PAT)

          # ── Health check ──
          - task: SSH@0
            displayName: 'Health check prod'
            inputs:
              sshEndpoint: 'OVH-SSH-Connection'
              runOptions: 'inline'
              failOnStdErr: false
              inline: |
                sleep 5
                curl -f http://localhost:3000 || exit 1